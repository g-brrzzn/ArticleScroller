name: Build and Release (Latest)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        working-directory: article-scroller
        run: flutter pub get

      - name: Build executable
        working-directory: article-scroller
        run: flutter build windows

      - name: Compress Release folder
        working-directory: article-scroller/build/windows/x64/runner
        run: Compress-Archive -Path Release\* -DestinationPath ArticleScroller-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: article-scroller/build/windows/x64/runner/ArticleScroller-Windows.zip

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        working-directory: article-scroller
        run: flutter pub get

      - name: Build APK
        working-directory: article-scroller
        run: flutter build apk --release

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: article-scroller/build/app/outputs/flutter-apk/article-scroller.apk

  create-release:
    name: Publish Release
    needs: [build-windows, build-android] 
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          
      - name: Download Android Build
        uses: actions/download-artifact@v4
        with:
          name: android-build

      - name: Update Latest Release
        uses: ncipollo/release-action@v1
        with:
          tag: "latest"
          name: "Latest Build"
          body: "Latest automated build compiled from the main branch."
          artifacts: "ArticleScroller-Windows.zip,article-scroller.apk"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true